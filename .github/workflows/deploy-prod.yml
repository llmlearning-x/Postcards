name: Deploy to Production Environment

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      deploy_backend:
        description: 'Deploy backend API'
        required: true
        default: true
        type: boolean
      deploy_frontend:
        description: 'Deploy frontend H5'
        required: true
        default: true
        type: boolean

jobs:
  deploy-backend:
    name: Deploy Backend API
    runs-on: ubuntu-latest
    # push tags 时自动部署；手动触发时根据 inputs 决定
    if: ${{ github.event_name == 'push' || inputs.deploy_backend == true }}
    defaults:
      run:
        working-directory: Postcards-Server
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Postcards-Server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Clean old build on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.PROD_DEPLOY_KEY }}
          script: |
            rm -rf /data/postcards/dist

      - name: Deploy to production server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.PROD_DEPLOY_KEY }}
          source: "Postcards-Server/dist/,Postcards-Server/package.json,Postcards-Server/ecosystem.config.js,Postcards-Server/stamps/"
          target: "/data/postcards/"
          strip_components: 1

      - name: Restart backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.PROD_DEPLOY_KEY }}
          script: |
            cd /data/postcards
            mkdir -p /data/postcards/uploads
            npm install --omit=dev
            pm2 reload postcards-api || pm2 start ecosystem.config.js
            pm2 save

  deploy-frontend:
    name: Deploy Frontend H5
    runs-on: ubuntu-latest
    # push tags 时自动部署；手动触发时根据 inputs 决定
    if: ${{ github.event_name == 'push' || inputs.deploy_frontend == true }}
    defaults:
      run:
        working-directory: Postcards-UniApp
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Postcards-UniApp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build H5
        run: npm run build:h5

      - name: Clean old H5 on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.PROD_DEPLOY_KEY }}
          script: |
            rm -rf /data/postcards/h5/assets /data/postcards/h5/static /data/postcards/h5/index.html

      - name: Deploy to production server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.PROD_DEPLOY_KEY }}
          source: "Postcards-UniApp/dist/build/h5/"
          target: "/data/postcards/h5"
          strip_components: 4

      - name: Reload nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.PROD_DEPLOY_KEY }}
          script: |
            nginx -t && systemctl reload nginx
